name: Kiro Remote (ppc-final)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Instrucción para Kiro (qué quieres que haga)"
        required: true
        type: string
      trust_level:
        description: "Nivel de permisos para tools"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - read-only
      create_pr:
        description: "¿Crear PR con los cambios?"
        required: true
        default: true
        type: boolean

jobs:
  kiro-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Install uv (for MCP servers)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Configure Supabase MCP
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p .kiro/settings
          cat > .kiro/settings/mcp.json << 'MCPEOF'
          {
            "mcpServers": {
              "supabase": {
                "command": "uvx",
                "args": ["supabase-mcp-server@latest", "--project-ref", "tzmbznenarrpjayntyjt"],
                "env": {
                  "SUPABASE_ACCESS_TOKEN": "${SUPABASE_ACCESS_TOKEN}"
                },
                "disabled": false,
                "autoApprove": [
                  "list_tables",
                  "execute_sql",
                  "list_extensions",
                  "list_migrations",
                  "get_project_url",
                  "get_publishable_keys",
                  "generate_typescript_types",
                  "search_docs",
                  "get_logs",
                  "get_advisors"
                ]
              }
            }
          }
          MCPEOF
          # Replace the env var placeholder with actual value
          sed -i "s|\${SUPABASE_ACCESS_TOKEN}|${SUPABASE_ACCESS_TOKEN}|g" .kiro/settings/mcp.json
          echo "✅ MCP config created"

      - name: Run Kiro headless
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          TRUST_FLAG="--trust-all-tools"
          if [ "${{ inputs.trust_level }}" = "read-only" ]; then
            TRUST_FLAG="--trust-tools=read,grep"
          fi

          echo "🤖 Ejecutando Kiro con prompt:"
          echo "${{ inputs.prompt }}"
          echo "---"

          kiro-cli chat --no-interactive $TRUST_FLAG "${{ inputs.prompt }}" 2>&1 | tee .kiro_output.txt

          echo "---"
          echo "✅ Kiro terminó"

      - name: Check for changes and create PR
        if: inputs.create_pr && inputs.trust_level == 'all'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configurar git
          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"

          # Excluir archivos temporales de MCP config
          git checkout -- .kiro/settings/mcp.json 2>/dev/null || true
          rm -f .kiro/settings/mcp.json

          # Verificar si hay cambios
          git add -A
          if git diff --staged --quiet; then
            echo "📭 Sin cambios — nada que commitear"
            exit 0
          fi

          # Crear branch y PR
          BRANCH="kiro/remote-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "feat: cambios remotos via Kiro

          Prompt: ${{ inputs.prompt }}"

          git push -u origin "$BRANCH"

          gh pr create \
            --title "🤖 Kiro remote: $(echo '${{ inputs.prompt }}' | head -c 60)" \
            --body "## Prompt enviado
          \`\`\`
          ${{ inputs.prompt }}
          \`\`\`

          ## Output de Kiro
          \`\`\`
          $(cat .kiro_output.txt | tail -100)
          \`\`\`

          ---
          _Generado automáticamente por Kiro headless mode_" \
            --base main

          echo "✅ PR creado en branch $BRANCH"

      - name: Upload Kiro output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiro-output
          path: .kiro_output.txt
          retention-days: 7
