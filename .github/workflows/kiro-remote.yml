name: Kiro Remote (ppc-final)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "InstrucciĂłn para Kiro (quĂ© quieres que haga)"
        required: true
        type: string
      trust_level:
        description: "Nivel de permisos para tools"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - read-only
      create_pr:
        description: "ÂżCrear PR con los cambios?"
        required: true
        default: true
        type: boolean
      telegram_chat_id:
        description: "Chat ID de Telegram para enviar resultado (vacĂ­o = no notificar)"
        required: false
        default: ""
        type: string

jobs:
  kiro-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Query Supabase (if prompt mentions db/tabla/supabase/profiles/etc)
        id: supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PROMPT="${{ inputs.prompt }}"
          PROMPT_LOWER=$(echo "$PROMPT" | tr '[:upper:]' '[:lower:]')

          # Check if prompt is about database queries
          if echo "$PROMPT_LOWER" | grep -qE '(supabase|tabla|tablas|profiles|matches|tournaments|divisions|jugador|partidos|torneo|base de datos|database|query|sql|cuantos|cuĂˇntos|count|filas|rows|registros)'; then
            echo "đź”Ť Prompt parece requerir datos de Supabase â€” ejecutando query previa..."

            # Get table list with row counts
            TABLES_INFO=$(curl -s "${SUPABASE_URL}/rest/v1/rpc/get_table_info" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" 2>/dev/null || echo "")

            if [ -z "$TABLES_INFO" ] || [ "$TABLES_INFO" = "[]" ]; then
              # Fallback: query common tables individually
              echo "Querying tables individually..."
              TABLES_INFO="Table row counts:"
              for table in profiles tournaments divisions matches match_sets locations availability social_events court_booking_requests booking_accounts booking_admins player_cards live_score_state tournament_registrations; do
                COUNT=$(curl -s "${SUPABASE_URL}/rest/v1/${table}?select=count" \
                  -H "apikey: ${SUPABASE_KEY}" \
                  -H "Authorization: Bearer ${SUPABASE_KEY}" \
                  -H "Prefer: count=exact" \
                  -H "Range: 0-0" \
                  -D /tmp/headers_${table}.txt -o /dev/null 2>/dev/null)
                ROW_COUNT=$(grep -i content-range /tmp/headers_${table}.txt 2>/dev/null | sed 's/.*\///' | tr -d '\r\n' || echo "?")
                TABLES_INFO="${TABLES_INFO}\n- ${table}: ${ROW_COUNT} rows"
              done
            fi

            # If prompt asks about specific data, try to fetch it
            EXTRA_DATA=""
            if echo "$PROMPT_LOWER" | grep -qE '(jugador|player|profiles|cuantos|cuĂˇntos|count.*profile)'; then
              EXTRA_DATA=$(curl -s "${SUPABASE_URL}/rest/v1/profiles?select=id,name,nickname,role&order=created_at.desc&limit=50" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" 2>/dev/null || echo "[]")
            fi

            # Save context for Kiro
            {
              echo "=== SUPABASE DATA (pre-fetched) ==="
              echo -e "$TABLES_INFO"
              if [ -n "$EXTRA_DATA" ] && [ "$EXTRA_DATA" != "[]" ]; then
                echo ""
                echo "=== QUERY RESULTS ==="
                echo "$EXTRA_DATA" | python3 -m json.tool 2>/dev/null || echo "$EXTRA_DATA"
              fi
              echo "=== END SUPABASE DATA ==="
            } > .supabase_context.txt

            echo "has_context=true" >> "$GITHUB_OUTPUT"
            echo "âś… Supabase context gathered"
            cat .supabase_context.txt
          else
            echo "has_context=false" >> "$GITHUB_OUTPUT"
            echo "â„ąď¸Ź Prompt no requiere datos de Supabase"
          fi

      - name: Run Kiro headless
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          TRUST_FLAG="--trust-all-tools"
          if [ "${{ inputs.trust_level }}" = "read-only" ]; then
            TRUST_FLAG="--trust-tools=read,grep"
          fi

          # Build prompt with Supabase context if available
          FULL_PROMPT="${{ inputs.prompt }}"
          if [ "${{ steps.supabase.outputs.has_context }}" = "true" ] && [ -f .supabase_context.txt ]; then
            CONTEXT=$(cat .supabase_context.txt)
            FULL_PROMPT="Tengo estos datos de Supabase pre-consultados para ti:

          ${CONTEXT}

          Ahora responde esta instrucciĂłn usando los datos anteriores: ${{ inputs.prompt }}"
          fi

          echo "đź¤– Ejecutando Kiro con prompt:"
          echo "${{ inputs.prompt }}"
          echo "---"

          kiro-cli chat --no-interactive $TRUST_FLAG "$FULL_PROMPT" 2>&1 | tee .kiro_output.txt

          echo "---"
          echo "âś… Kiro terminĂł"

      - name: Check for changes and create PR
        if: inputs.create_pr && inputs.trust_level == 'all'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"

          # Clean up temp files
          rm -f .supabase_context.txt .kiro_output.txt
          git checkout -- .kiro/settings/mcp.json 2>/dev/null || true
          rm -f .kiro/settings/mcp.json

          git add -A
          if git diff --staged --quiet; then
            echo "đź“­ Sin cambios â€” nada que commitear"
            exit 0
          fi

          BRANCH="kiro/remote-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "feat: cambios remotos via Kiro

          Prompt: ${{ inputs.prompt }}"

          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "đź¤– Kiro remote: $(echo '${{ inputs.prompt }}' | head -c 60)" \
            --body "## Prompt enviado
          \`\`\`
          ${{ inputs.prompt }}
          \`\`\`

          ## Output de Kiro
          \`\`\`
          $(cat .kiro_output.txt | tail -100)
          \`\`\`

          ---
          _Generado automĂˇticamente por Kiro headless mode_" \
            --base main 2>&1)

          echo "$PR_URL"
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"

      - name: Notify Telegram
        if: always() && inputs.telegram_chat_id != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id }}
        run: |
          if [ -f .kiro_output.txt ]; then
            OUTPUT=$(tail -80 .kiro_output.txt | head -c 3500)
          else
            OUTPUT="(sin output)"
          fi

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="âś… Completado"
          else
            STATUS="âťŚ FallĂł"
          fi

          PR_INFO=""
          if [ -n "${PR_URL:-}" ]; then
            PR_INFO="
          đź“¦ PR: ${PR_URL}"
          fi

          MESSAGE="${STATUS} â€” *ppc-final*

          đź“ť _${{ inputs.prompt }}_
          ${PR_INFO}

          \`\`\`
          ${OUTPUT}
          \`\`\`"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$MESSAGE" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"

      - name: Upload Kiro output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiro-output
          path: .kiro_output.txt
          retention-days: 7
