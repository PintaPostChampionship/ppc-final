name: Kiro Remote (ppc-final)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Instrucción para Kiro (qué quieres que haga)"
        required: true
        type: string
      trust_level:
        description: "Nivel de permisos para tools"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - read-only
      create_pr:
        description: "¿Crear PR con los cambios?"
        required: true
        default: true
        type: boolean
      telegram_chat_id:
        description: "Chat ID de Telegram para enviar resultado (vacío = no notificar)"
        required: false
        default: ""
        type: string

jobs:
  kiro-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Install uv (for MCP servers)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Configure Supabase MCP
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p .kiro/settings
          echo '{"mcpServers":{"supabase":{"command":"uvx","args":["supabase-mcp-server@latest","--project-ref","tzmbznenarrpjayntyjt"],"env":{"SUPABASE_ACCESS_TOKEN":"'"${SUPABASE_ACCESS_TOKEN}"'"},"disabled":false,"autoApprove":["list_tables","execute_sql","list_extensions","list_migrations","get_project_url","get_publishable_keys","generate_typescript_types","search_docs","get_logs","get_advisors"]}}}' > .kiro/settings/mcp.json
          echo "✅ MCP config created"
          python3 -m json.tool .kiro/settings/mcp.json || cat .kiro/settings/mcp.json

      - name: Run Kiro headless
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          TRUST_FLAG="--trust-all-tools"
          if [ "${{ inputs.trust_level }}" = "read-only" ]; then
            TRUST_FLAG="--trust-tools=read,grep"
          fi

          echo "🤖 Ejecutando Kiro con prompt:"
          echo "${{ inputs.prompt }}"
          echo "---"

          kiro-cli chat --no-interactive $TRUST_FLAG "${{ inputs.prompt }}" 2>&1 | tee .kiro_output.txt

          echo "---"
          echo "✅ Kiro terminó"

      - name: Check for changes and create PR
        if: inputs.create_pr && inputs.trust_level == 'all'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "kiro-bot"
          git config user.email "kiro-bot@users.noreply.github.com"

          git checkout -- .kiro/settings/mcp.json 2>/dev/null || true
          rm -f .kiro/settings/mcp.json

          git add -A
          if git diff --staged --quiet; then
            echo "📭 Sin cambios — nada que commitear"
            exit 0
          fi

          BRANCH="kiro/remote-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "feat: cambios remotos via Kiro

          Prompt: ${{ inputs.prompt }}"

          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "🤖 Kiro remote: $(echo '${{ inputs.prompt }}' | head -c 60)" \
            --body "## Prompt enviado
          \`\`\`
          ${{ inputs.prompt }}
          \`\`\`

          ## Output de Kiro
          \`\`\`
          $(cat .kiro_output.txt | tail -100)
          \`\`\`

          ---
          _Generado automáticamente por Kiro headless mode_" \
            --base main 2>&1)

          echo "$PR_URL"
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"

      - name: Notify Telegram
        if: always() && inputs.telegram_chat_id != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id }}
        run: |
          # Prepare output (truncate to ~3500 chars for Telegram's 4096 limit)
          if [ -f .kiro_output.txt ]; then
            OUTPUT=$(tail -80 .kiro_output.txt | head -c 3500)
          else
            OUTPUT="(sin output)"
          fi

          # Determine status
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ Completado"
          else
            STATUS="❌ Falló"
          fi

          # Build message
          PR_INFO=""
          if [ -n "${PR_URL:-}" ]; then
            PR_INFO="
          📦 PR: ${PR_URL}"
          fi

          MESSAGE="${STATUS} — *ppc-final*

          📝 _${{ inputs.prompt }}_
          ${PR_INFO}

          \`\`\`
          ${OUTPUT}
          \`\`\`"

          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$MESSAGE" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"

      - name: Upload Kiro output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kiro-output
          path: .kiro_output.txt
          retention-days: 7
